#==============================================================================
# HAProxy — Production Open Banking / FAPI API Gateway
#
# Fronts an Open Banking platform (Account Information + Payment Initiation).
# Designed against FAPI 1.0 Advanced expectations:
#   - TLS 1.2+ only, strong ciphers, HSTS
#   - Mutual TLS (client certificate) enforcement on the API surface
#   - OAuth2 bearer-token presence enforcement (validation delegated to backend/AS)
#   - Per-client rate limiting + connection abuse protection
#   - Request correlation IDs (x-fapi-interaction-id)
#   - Real backends with active health checks, retries, and circuit-breaking
#
# Replace cert paths, server IPs, and the OAuth introspection logic with your
# environment's values before deploying. Validate with: haproxy -c -f this.cfg
#==============================================================================

global
    log /dev/log local0 info
    log /dev/log local1 notice

    chroot /var/lib/haproxy
    user  haproxy
    group haproxy
    daemon

    # Runtime API socket (stats, dynamic server mgmt, map updates)
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s

    # --- Tuning ---
    maxconn 60000
    nbthread 4

    # --- Modern TLS hardening (FAPI requires TLS 1.2 minimum) ---
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets prefer-client-ciphers
    ssl-default-server-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    ssl-default-server-options ssl-min-ver TLSv1.2 no-tls-tickets

    # Tighter DH for any non-ECDHE fallback
    tune.ssl.default-dh-param 2048

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  http-server-close
    option  forwardfor       except 127.0.0.0/8
    option  redispatch                     # re-dispatch to another server on connect failure
    retries 3

    timeout connect         5s
    timeout client          30s
    timeout server          30s
    timeout http-request    10s            # slowloris protection
    timeout http-keep-alive 10s
    timeout queue           20s
    timeout tunnel          1h

    default-server inter 3s fall 3 rise 2 slowstart 30s

    # Custom error pages (don't leak HAProxy internals to API clients)
    errorfile 400 /etc/haproxy/errors/400.json.http
    errorfile 403 /etc/haproxy/errors/403.json.http
    errorfile 408 /etc/haproxy/errors/408.json.http
    errorfile 429 /etc/haproxy/errors/429.json.http
    errorfile 500 /etc/haproxy/errors/500.json.http
    errorfile 502 /etc/haproxy/errors/502.json.http
    errorfile 503 /etc/haproxy/errors/503.json.http
    errorfile 504 /etc/haproxy/errors/504.json.http

#------------------------------------------------------------------------------
# HTTP :80  — redirect everything to HTTPS, no plaintext API access
#------------------------------------------------------------------------------
frontend http_redirect
    bind *:80
    mode http
    # ACME / Let's Encrypt challenge passthrough if you use certbot
    acl is_acme path_beg /.well-known/acme-challenge/
    use_backend acme_backend if is_acme
    http-request redirect scheme https code 301 unless is_acme

#------------------------------------------------------------------------------
# HTTPS :443 — the FAPI-secured API surface
#   ca-file + verify required => mutual TLS. Clients without a cert issued by
#   your Open Banking CA are rejected at the TLS layer.
#------------------------------------------------------------------------------
frontend https_api
    bind *:443 ssl crt /etc/haproxy/certs/openbanking.pem alpn h2,http/1.1 \
         ca-file /etc/haproxy/certs/ob-client-ca.pem verify required \
         crl-file /etc/haproxy/certs/ob-client-ca.crl

    mode http

    #--- Security response headers (applied to all responses) ---
    http-response set-header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    http-response set-header X-Content-Type-Options    "nosniff"
    http-response set-header X-Frame-Options           "DENY"
    http-response set-header Content-Security-Policy    "default-src 'none'; frame-ancestors 'none'"
    http-response set-header Cache-Control             "no-store"
    http-response set-header Referrer-Policy           "no-referrer"
    # Strip headers that leak topology
    http-response del-header Server
    http-response del-header X-Powered-By

    #--- Request correlation: FAPI interaction id (generate if client omits it) ---
    acl has_interaction_id hdr_cnt(x-fapi-interaction-id) gt 0
    http-request set-header x-fapi-interaction-id %[uuid()] unless has_interaction_id
    # Echo it back so the client can correlate
    http-response set-header x-fapi-interaction-id %[req.hdr(x-fapi-interaction-id)]

    #--- Propagate verified client cert identity to backends (for token binding) ---
    http-request set-header X-Client-Cert-Verify  %[ssl_c_verify]
    http-request set-header X-Client-Cert-DN       %[ssl_c_s_dn]
    http-request set-header X-Client-Cert-Serial   %[ssl_c_serial,hex]
    http-request set-header X-Forwarded-Proto      https
    # Never let a client spoof these
    http-request del-header X-Real-Client-Verified
    http-request set-header X-Real-Client-Verified %[ssl_c_verify]

    #========================== Abuse / Rate limiting =========================
    # Track per source IP in a stick-table; also track per client cert serial.
    stick-table type ipv6 size 1m expire 60s store http_req_rate(10s),conn_cur,conn_rate(10s)
    http-request track-sc0 src

    # Connection-rate abuse: > 100 new conns / 10s from one IP
    acl conn_rate_abuse  sc0_conn_rate(0) gt 100
    # Request-rate abuse: > 200 reqs / 10s from one IP
    acl req_rate_abuse   sc0_http_req_rate(0) gt 200

    http-request deny deny_status 429 if req_rate_abuse
    http-request silent-drop if conn_rate_abuse

    #========================== Basic request hygiene =========================
    # Require Authorization bearer token on all API calls (AS validates it).
    acl has_bearer hdr_beg(Authorization) -i "Bearer "
    acl is_health  path /health
    acl is_health  path /healthz
    http-request deny deny_status 401 if !has_bearer !is_health

    # Enforce JSON for write methods on payments
    acl is_write method POST PUT PATCH
    acl ctype_json hdr(Content-Type) -i -m sub application/json
    http-request deny deny_status 415 if is_write !ctype_json

    #============================== Routing ACLs ==============================
    acl path_accounts  path_beg /open-banking/v3.1/aisp     # Account Information
    acl path_payments  path_beg /open-banking/v3.1/pisp     # Payment Initiation
    acl path_consents  path_beg /open-banking/v3.1/consents
    acl path_funds     path_beg /open-banking/v3.1/cbpii    # Confirmation of Funds
    acl path_wellknown path_beg /.well-known
    acl path_metrics   path /metrics

    # Payments get an extra guard: idempotency key is mandatory (FAPI / OBIE)
    acl has_idempotency hdr_cnt(x-idempotency-key) gt 0
    http-request deny deny_status 400 if path_payments is_write !has_idempotency

    use_backend wellknown_backend if path_wellknown
    use_backend consents_backend  if path_consents
    use_backend accounts_backend  if path_accounts
    use_backend payments_backend  if path_payments
    use_backend funds_backend     if path_funds

    # Default: no matching route => 404 (don't fall through to a backend)
    http-request deny deny_status 404

#==============================================================================
# Backends — real upstream services with health checks & TLS to origin
#==============================================================================

backend accounts_backend
    mode http
    balance roundrobin
    option httpchk
    http-check send meth GET uri /health hdr Host accounts.internal
    http-check expect status 200
    # Re-verify the user token at the backend; HAProxy only checked presence.
    http-request set-header X-Route "aisp"
    server acc1 10.20.0.11:8443 check ssl verify required ca-file /etc/haproxy/certs/internal-ca.pem
    server acc2 10.20.0.12:8443 check ssl verify required ca-file /etc/haproxy/certs/internal-ca.pem

backend payments_backend
    mode http
    balance roundrobin
    option httpchk
    http-check send meth GET uri /health hdr Host payments.internal
    http-check expect status 200
    # Payments are non-idempotent: do NOT auto-retry once the request is sent.
    retry-on none
    http-request set-header X-Route "pisp"
    server pay1 10.20.0.21:8443 check ssl verify required ca-file /etc/haproxy/certs/internal-ca.pem maxconn 200
    server pay2 10.20.0.22:8443 check ssl verify required ca-file /etc/haproxy/certs/internal-ca.pem maxconn 200

backend consents_backend
    mode http
    balance roundrobin
    option httpchk
    http-check send meth GET uri /health hdr Host consents.internal
    http-check expect status 200
    http-request set-header X-Route "consents"
    server con1 10.20.0.31:8443 check ssl verify required ca-file /etc/haproxy/certs/internal-ca.pem
    server con2 10.20.0.32:8443 check ssl verify required ca-file /etc/haproxy/certs/internal-ca.pem

backend funds_backend
    mode http
    balance roundrobin
    option httpchk
    http-check send meth GET uri /health hdr Host funds.internal
    http-check expect status 200
    http-request set-header X-Route "cbpii"
    server fun1 10.20.0.41:8443 check ssl verify required ca-file /etc/haproxy/certs/internal-ca.pem

backend wellknown_backend
    mode http
    # Serves OIDC discovery / JWKS — public, cacheable, no auth needed.
    http-response set-header Cache-Control "public, max-age=300"
    server meta1 10.20.0.5:8080 check

backend acme_backend
    mode http
    server certbot 127.0.0.1:8888 check

#------------------------------------------------------------------------------
# Stats UI (bind to internal/admin network only — never public)
#------------------------------------------------------------------------------
listen stats
    bind 127.0.0.1:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE
    stats auth admin:CHANGE_ME_STRONG_PASSWORD
    no log
