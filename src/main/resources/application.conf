# ============================================================================
# Application configuration (pureconfig, kebab-case keys).
#
# Every value has a localhost-friendly default and an optional env override
# (`${?VAR}`). Twelve-factor: override anything via environment in prod.
# ============================================================================

public-http {
  host = "0.0.0.0"
  host = ${?PUBLIC_HTTP_HOST}
  port = 8080
  port = ${?PUBLIC_HTTP_PORT}
}

admin-http {
  host = "0.0.0.0"
  host = ${?ADMIN_HTTP_HOST}
  port = 8081
  port = ${?ADMIN_HTTP_PORT}
}

db {
  host = "localhost"
  host = ${?PG_HOST}
  port = 5432
  port = ${?PG_PORT}
  user = "trading"
  user = ${?PG_USER}
  password = "trading"
  password = ${?PG_PASSWORD}
  database = "trading"
  database = ${?PG_DB}
  pool-size = 16
  pool-size = ${?PG_POOL_SIZE}
  connect-timeout = "5 seconds"
  connect-timeout = ${?PG_CONNECT_TIMEOUT}
}

auth {
  issuer = "http://localhost:8082/realms/trading"
  issuer = ${?OIDC_ISSUER}
  audience = "trading-app"
  audience = ${?OIDC_AUDIENCE}
  jwks-uri = "http://localhost:8082/realms/trading/protocol/openid-connect/certs"
  jwks-uri = ${?OIDC_JWKS_URI}
  roles-claim = "realm_access.roles"
  roles-claim = ${?OIDC_ROLES_CLAIM}
}

kraken {
  base-uri = "https://api.kraken.com"
  base-uri = ${?KRAKEN_BASE_URI}
  api-key = ""
  api-key = ${?KRAKEN_API_KEY}
  api-secret = ""
  api-secret = ${?KRAKEN_API_SECRET}
}

binance {
  base-uri = "https://api.binance.com"
  base-uri = ${?BINANCE_BASE_URI}
  api-key = ""
  api-key = ${?BINANCE_API_KEY}
  api-secret = ""
  api-secret = ${?BINANCE_API_SECRET}
}

fireblocks {
  base-uri = "https://api.fireblocks.io"
  base-uri = ${?FIREBLOCKS_BASE_URI}
  api-key = ""
  api-key = ${?FIREBLOCKS_API_KEY}
  api-secret-pem-path = "/run/secrets/fireblocks.pem"
  api-secret-pem-path = ${?FIREBLOCKS_SECRET_PEM_PATH}
  vault-account-id = "0"
  vault-account-id = ${?FIREBLOCKS_VAULT_ID}
}

enable-live-exchanges = false
enable-live-exchanges = ${?EXCHANGES_LIVE}
