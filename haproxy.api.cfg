#---------------------------------------------------------------------
# global — process-wide settings (one per haproxy instance)
#---------------------------------------------------------------------
global
    log /dev/log local0 info          # send logs to syslog facility local0 at 'info'
                                       # use 'notice' in very high-traffic prod to cut volume
    log /dev/log local1 notice         # second target for admin/alerts

    maxconn 100000                     # hard ceiling on concurrent connections for the PROCESS.
                                       # size to RAM: each conn ~ tens of KB; 100k ≈ a few GB.
                                       # must be >= sum of frontend maxconn you expect.

    nbthread 8                         # worker threads. Set = number of CPU cores you want HAProxy
                                       # to use. Prefer threads over the old nbproc multi-process model.
    cpu-map auto:1/1-8 0-7             # pin the 8 threads to cores 0-7 to avoid scheduler migration.

    # --- security / privilege drop ---
    user  haproxy
    group haproxy
    chroot /var/lib/haproxy            # filesystem jail after startup
    pidfile /run/haproxy.pid

    # --- runtime API: live stats, drain servers, reload state ---
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s

    # --- TLS defaults (modern, no legacy) ---
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets
    tune.ssl.default-dh-param 2048

#---------------------------------------------------------------------
# defaults — inherited by every frontend/backend below unless overridden
#---------------------------------------------------------------------
defaults
    log     global
    mode    http                       # L7 HTTP processing (parse headers, route on path/host)
    option  httplog                    # rich HTTP log line (status, timers, bytes, backend, server)
    option  dontlognull                # don't log health-check/probe connections that send no data
    option  http-keep-alive            # reuse client connections (lower latency, fewer handshakes)
    option  forwardfor                 # inject X-Forwarded-For so backends see the real client IP
    option  redispatch                 # if chosen server is down, re-pick another (don't fail the req)
    retries 3                          # connection-level retries before giving up / redispatching

    # --- timeouts: the four that matter most in prod ---
    timeout connect 5s                 # max time to ESTABLISH a TCP conn to a backend server.
                                       # keep SHORT — a dead server should fail fast, not hang clients.
    timeout client  30s                # max idle time on the client side between data chunks.
    timeout server  30s                # max idle time waiting for the backend to respond.
                                       # raise for slow APIs/reports; keep low for snappy services.
    timeout http-request 10s           # max time for client to send the FULL request header.
                                       # mitigates Slowloris.
    timeout http-keep-alive 10s        # how long to hold an idle keep-alive conn open.
    timeout queue 10s                  # max time a request waits in backend queue when all
                                       # servers are at maxconn before returning 503.
    timeout check 5s                   # max time for a single health check to complete (see below).

#---------------------------------------------------------------------
# frontend — ingress: bind, terminate TLS, classify, dispatch
#---------------------------------------------------------------------
frontend fe_https
    bind :80
    bind :443 ssl crt /etc/haproxy/certs/ alpn h2,http/1.1
                                       # ssl     -> terminate TLS here
                                       # crt DIR -> load all PEMs in dir (SNI selects the cert)
                                       # alpn    -> negotiate HTTP/2, fall back to HTTP/1.1

    http-request redirect scheme https unless { ssl_fc }   # force HTTPS

    # HSTS — tell browsers to always use HTTPS for 1 year
    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains"

    maxconn 50000                      # per-frontend cap (<= global maxconn)

    # --- request classification with ACLs ---
    acl is_api  path_beg /api/
    acl is_static path_end .jpg .png .css .js .woff2

    # --- content switching: route by ACL, else default ---
    use_backend be_api    if is_api
    use_backend be_static if is_static
    default_backend be_app

#---------------------------------------------------------------------
# backend — egress: server pool + scheduling + HEALTH CHECKS
#---------------------------------------------------------------------
backend be_app
    balance roundrobin                 # scheduling discipline. roundrobin = even spread.
                                       # use 'leastconn' for long-lived/uneven request costs.

    # --- cookie-based session affinity (stickiness) ---
    cookie SRVID insert indirect nocache
                                       # insert  -> HAProxy sets the cookie (app needn't know)
                                       # indirect-> strip cookie before passing to server
                                       # nocache -> prevent shared caches from storing it

    # =================================================================
    # ACTIVE HEALTH CHECK
    # =================================================================
    option httpchk                     # do L7 HTTP checks instead of bare TCP connect.
    http-check send meth GET uri /healthz ver HTTP/1.1 hdr Host app.internal
                                       # the probe request. Point at a LIGHTWEIGHT endpoint that
                                       # verifies deps (DB/cache) WITHOUT heavy work.
    http-check expect status 200       # mark UP only on 200. Alternatives:
                                       #   expect status 200-299
                                       #   expect rstatus ^2..        (regex)
                                       #   expect string OK           (body contains "OK")
                                       #   expect ! rstring maintenance (fail if body matches)

    # default-server applies these check params to every 'server' line below
    default-server check \
        inter 2s \                     # INTERVAL between checks when server is UP (steady state).
                                       #   shorter = faster detection, more probe load. 2s is typical.
        fastinter 1s \                 # interval used while in a TRANSITIONAL state (flapping up/down).
                                       #   probes faster to confirm/deny a state change quickly.
        downinter 5s \                 # interval between checks while server is DOWN.
                                       #   longer = don't hammer a dead box; speeds nothing for clients.
        rise 2 \                       # # of CONSECUTIVE successful checks to mark a DOWN server UP.
                                       #   higher = avoid flapping a still-unstable server back in.
        fall 3 \                       # # of CONSECUTIVE failed checks to mark an UP server DOWN.
                                       #   higher = tolerate transient blips; lower = eject faster.
        slowstart 30s \                # after coming UP, ramp traffic 0->100% over 30s.
                                       #   protects a cold JIT/cache/connection-pool from a thundering herd.
        maxconn 500 \                  # per-server concurrent connection cap; excess goes to queue.
        maxqueue 100 \                 # max queued requests per server before redispatch/503.
        weight 100                     # relative share for the LB algorithm (default 1..256 range).

    # observe layer7 + on-error => PASSIVE checks: react to REAL traffic errors,
    # not just synthetic probes. Ejects a server that's failing live requests.
    default-server observe layer7 error-limit 10 on-error mark-down

    # --- the actual servers ---
    server app1 10.0.1.11:8080 cookie app1
    server app2 10.0.1.12:8080 cookie app2
    server app3 10.0.1.13:8080 cookie app3 backup
                                       # backup -> only receives traffic when all non-backup
                                       #           servers are DOWN (cold spare).

    # agent-check (optional): a side-channel where the app reports its OWN health/weight.
    # The agent returns e.g. "up", "down", "drain", or "75%" on a TCP port.
    # Lets the app shed load or drain itself for deploys without touching HAProxy.
    # server app1 10.0.1.11:8080 check agent-check agent-addr 10.0.1.11 agent-port 9999 agent-inter 2s

#---------------------------------------------------------------------
backend be_api
    balance leastconn                  # API calls vary in cost -> send to least-busy server
    option httpchk
    http-check send meth GET uri /api/health
    http-check expect status 200
    default-server check inter 2s fastinter 1s downinter 5s rise 2 fall 3
    server api1 10.0.2.11:9090
    server api2 10.0.2.12:9090

#---------------------------------------------------------------------
backend be_static
    balance roundrobin
    option httpchk
    http-check send meth HEAD uri /healthz   # HEAD = cheaper than GET for static health
    http-check expect status 200
    default-server check inter 5s fall 3 rise 2   # static rarely flaps -> slower interval is fine
    server cdn1 10.0.3.11:80
    server cdn2 10.0.3.12:80

#---------------------------------------------------------------------
# stats UI — operational dashboard (lock this down!)
#---------------------------------------------------------------------
frontend stats
    bind 127.0.0.1:8404                # bind to localhost only; reach via SSH tunnel / internal net
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE               # enable drain/disable buttons (restrict by ACL in real prod)
    stats auth admin:CHANGE_ME_STRONG # basic auth — replace with a real secret / put behind SSO
