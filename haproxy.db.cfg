#---------------------------------------------------------------------
# global
#---------------------------------------------------------------------
global
    log /dev/log local0 info
    maxconn 20000                      # DB conns are precious & long-lived; size to match
                                       # Postgres max_connections across the cluster + headroom.
    nbthread 4
    user  haproxy
    group haproxy
    chroot /var/lib/haproxy
    pidfile /run/haproxy.pid
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s

#---------------------------------------------------------------------
# defaults — note: mode tcp, and VERY different timeouts vs HTTP
#---------------------------------------------------------------------
defaults
    log     global
    mode    tcp                        # L4: HAProxy pipes raw bytes; it does NOT parse the
                                       # Postgres wire protocol for the data path.
    option  tcplog                     # log src, dst, backend, server, timers, bytes
    option  dontlognull
    retries 2

    # --- timeouts: DB sessions are long; do NOT use HTTP-style short values ---
    timeout connect 5s                 # establish TCP to Postgres — keep SHORT, fail fast on a dead node
    timeout client  4h                 # idle client session before HAProxy cuts it.
                                       # set to your longest legit idle transaction/session.
                                       # too short -> "server closed the connection unexpectedly".
    timeout server  4h                 # idle backend side; mirror timeout client.
    timeout check   3s                 # max time for ONE health probe to finish.
    timeout queue   3s                 # wait for a free server slot before failing

    # keep idle TCP sessions alive through firewalls/NAT so they aren't silently dropped
    option clitcpka
    option srvtcpka

#=====================================================================
# OPTION A (RECOMMENDED): Patroni-managed cluster, role-aware HTTP checks
#   - Patroni runs a REST API on each node (default :8008)
#   - GET /primary  -> 200 only on the current leader (read-write)
#   - GET /replica  -> 200 only on healthy, streaming replicas (read-only)
#   - GET /health   -> 200 if Postgres is running at all
#   This is how role-based routing stays correct across failovers.
#=====================================================================

#---------------------------------------------------------------------
# WRITES — clients connect here for read-write; always lands on the leader
#---------------------------------------------------------------------
frontend ft_pg_write
    bind :5432
    default_backend be_pg_primary

backend be_pg_primary
    # exactly one server should answer /primary with 200 at any time, so this
    # backend naturally holds a single active node and follows failover automatically.
    option httpchk GET /primary        # L7 probe used to DETERMINE ROLE...
    http-check expect status 200       # ...UP only if this node is the leader.

    # 'port 8008' => run the CHECK against Patroni's API port, while the
    # 'server' address (5432) is where real client TRAFFIC goes. Decoupled on purpose.
    default-server port 8008 \
        check \
        inter 2s \                     # probe interval when UP
        fastinter 1s \                 # probe interval while transitioning (confirm failover fast)
        downinter 3s \                 # probe interval when DOWN
        rise 2 \                       # consecutive passes to mark UP — keep LOW for writes so a
                                       #   promoted leader starts taking writes quickly
        fall 2 \                       # consecutive fails to mark DOWN — LOW so a demoted/old
                                       #   leader stops getting writes ASAP (avoid split-brain writes)
        on-marked-down shutdown-sessions
                                       # CRITICAL for failover: when the old primary is marked down,
                                       # FORCIBLY KILL its existing sessions. Otherwise clients keep
                                       # writing to a demoted node. This forces them to reconnect and
                                       # land on the new leader.

    server pg1 10.0.10.11:5432
    server pg2 10.0.10.12:5432
    server pg3 10.0.10.13:5432
    # all three are listed; only the one currently answering /primary=200 is UP.

#---------------------------------------------------------------------
# READS — clients connect here for read-only; spread across replicas
#---------------------------------------------------------------------
frontend ft_pg_read
    bind :5433
    default_backend be_pg_replicas

backend be_pg_replicas
    balance roundrobin                 # or leastconn if read queries vary a lot in cost
    option httpchk GET /replica        # UP only on healthy streaming replicas
    http-check expect status 200       # /replica also fails a replica lagging beyond Patroni's
                                       # configured max-lag, so you don't read very stale data.

    default-server port 8008 \
        check inter 2s fastinter 1s downinter 3s \
        rise 3 \                       # for reads, HIGHER rise = don't add a still-catching-up
                                       #   replica back too eagerly (anti-flap / avoid stale reads)
        fall 2 \                       # drop a bad replica quickly
        on-marked-down shutdown-sessions

    server pg1 10.0.10.11:5432
    server pg2 10.0.10.12:5432
    server pg3 10.0.10.13:5432
    # Tip: if you want the leader to ALSO serve reads when no replica is healthy,
    # probe GET /read-only (200 on primary OR replica) instead of /replica,
    # or mark the leader 'backup' here.

#=====================================================================
# OPTION B: No Patroni — HAProxy's NATIVE PostgreSQL check
#   Use when you just need "is Postgres accepting connections", e.g. a
#   simpler topology or a pgbouncer pool. NOTE: this does NOT tell you
#   primary vs replica — it only confirms the server answers the
#   startup handshake. Role-based routing needs Option A or a custom check.
#=====================================================================
# backend be_pg_simple
#     option pgsql-check user haproxy_check
#                                      # sends a real Postgres startup packet as this user.
#                                      # The role must EXIST in pg_hba.conf and be allowed to
#                                      # connect (a no-privilege login role is enough).
#                                      # More accurate than a bare TCP connect: it proves the
#                                      # postmaster is actually past startup/recovery and talking
#                                      # the wire protocol — not just that the port is open.
#     default-server check inter 2s fall 3 rise 2 port 5432
#     server pg1 10.0.10.11:5432
#     server pg2 10.0.10.12:5432

#---------------------------------------------------------------------
# stats UI (localhost only)
#---------------------------------------------------------------------
frontend stats
    bind 127.0.0.1:7000
    mode http                          # the stats UI is HTTP even though the DB backends are TCP
    stats enable
    stats uri /
    stats refresh 5s
    stats auth admin:CHANGE_ME_STRONG
