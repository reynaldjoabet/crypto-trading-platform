services:

  postgres:
    image: postgres:18-alpine
    container_name: trading-postgres
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
      POSTGRES_DB: trading
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    container_name: trading-keycloak
    command: ["start-dev", "--http-port=8082", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8082:8082"
    volumes:
      - ./deploy/keycloak:/opt/keycloak/data/import

  app:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: trading-app
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      PG_HOST: postgres
      PG_USER: trading
      PG_PASSWORD: trading
      PG_DB: trading
      OIDC_ISSUER: http://keycloak:8082/realms/trading
      OIDC_JWKS_URI: http://keycloak:8082/realms/trading/protocol/openid-connect/certs
      EXCHANGES_LIVE: "false"
    ports:
      - "8080:8080"   # client API
      - "8081:8081"   # admin API

volumes:
  pgdata:
